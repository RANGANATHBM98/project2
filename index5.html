<!DOCTYPE html>
<html>
<head>
    <title>Travel Recommendation</title>
</head>
<body>

<h1>Travel Recommendation Website</h1>

<input type="text" id="search" placeholder="Search here...">
<button onclick="showResults()">Search</button>

<hr>

<div id="results"></div>

<script>
function showResults() {
    let input = document.getElementById("search").value.toLowerCase();

    if (input.includes("beach")) {
        document.getElementById("results").innerHTML = `
        <h2>Beaches</h2>

        <img src="https://picsum.photos/200?random=1">
        <p>Goa Beach</p>

        <img src="https://picsum.photos/200?random=2">
        <p>Maldives Beach</p>
        `;
    } 
    else if (input.includes("temple")) {
        document.getElementById("results").innerHTML = `
        <h2>Temples</h2>

        <img src="https://picsum.photos/200?random=3">
        <p>Tirupati Temple</p>

        <img src="https://picsum.photos/200?random=4">
        <p>Golden Temple</p>
        `;
    }
    else if (input.includes("country")) {
        document.getElementById("results").innerHTML = `
        <h2>Countries</h2>

        <img src="https://picsum.photos/200?random=5">
        <p>India</p>

        <img src="https://picsum.photos/200?random=6">
        <p>USA</p>
        `;
    }
    else {
        document.getElementById("results").innerHTML = "<p>No results found</p>";
    }
}
</script>

</body>
</html>
